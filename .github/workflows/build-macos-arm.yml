name: Build macOS ARM

on:
  workflow_dispatch:
  push:
    branches: [main]

env:
  FLUTTER_VERSION: '3.38.5'
  IS_GITHUB_ACTIONS: 1

jobs:
  build-macos:
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Node.js (for appdmg)
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install appdmg
        run: npm install -g appdmg

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          cache: true

      - name: Install fastforge
        run: dart pub global activate fastforge

      - name: Flutter info
        run: flutter doctor -v

      - name: Prepare (deps + codegen + core libs)
        run: make macos-prepare

      - name: Sign hiddify-core.dylib (ad-hoc)
        run: |
          echo "=== Signing hiddify-core.dylib ==="
          ls -la hiddify-core/bin/
          codesign --force --sign - --timestamp --entitlements macos/Runner/DebugProfile.entitlements hiddify-core/bin/hiddify-core.dylib || \
          codesign --force --sign - hiddify-core/bin/hiddify-core.dylib || \
          echo "Warning: codesign failed, continuing anyway"
          codesign -dvv hiddify-core/bin/hiddify-core.dylib || true

      - name: Build and package
        run: make macos-release

      - name: Sign app bundle (ad-hoc deep)
        run: |
          echo "=== Signing app bundle ==="
          # Find the .app in build directory (not dist, which has the packaged DMG/PKG)
          APP_PATH=$(find build -name "*.app" -type d 2>/dev/null | head -1)
          if [ -z "$APP_PATH" ]; then
            APP_PATH=$(find dist -name "*.app" -type d 2>/dev/null | head -1)
          fi
          if [ -z "$APP_PATH" ]; then
            # Look inside the DMG staging area
            APP_PATH=$(find dist -name "*.app" -maxdepth 3 -type d 2>/dev/null | head -1)
          fi
          if [ -n "$APP_PATH" ]; then
            echo "Found app: $APP_PATH"
            # Deep sign the entire bundle with entitlements
            codesign --force --deep --sign - --entitlements macos/Runner/Release.entitlements "$APP_PATH" 2>&1 || \
            codesign --force --deep --sign - "$APP_PATH" 2>&1 || \
            echo "Warning: deep codesign failed"
            # Sign the dylib inside the app specifically
            find "$APP_PATH" -name "hiddify-core.dylib" -exec codesign --force --sign - --entitlements macos/Runner/Release.entitlements {} \; 2>&1 || true
            # Verify
            codesign -dvv "$APP_PATH" 2>&1 || true
          else
            echo "No .app found, listing build dir:"
            find build -name "*.app" -type d 2>/dev/null || true
            find dist -type f 2>/dev/null | head -20
          fi

      - name: Find artifacts
        run: |
          echo "=== dist contents ==="
          find dist -type f || echo "no dist"
          mkdir -p out
          find dist -name "*.dmg" -exec cp {} out/ \; 2>/dev/null || true
          find dist -name "*.pkg" -exec cp {} out/ \; 2>/dev/null || true
          ls -la out/

      - name: Upload DMG
        uses: actions/upload-artifact@v4
        with:
          name: Hiddify-macOS-ARM-dmg
          path: out/*.dmg
          retention-days: 7

      - name: Upload PKG
        uses: actions/upload-artifact@v4
        with:
          name: Hiddify-macOS-ARM-pkg
          path: out/*.pkg
          retention-days: 7
