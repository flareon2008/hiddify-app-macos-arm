name: Build macOS ARM

on:
  workflow_dispatch:
  push:
    branches: [main]

env:
  FLUTTER_VERSION: '3.38.5'
  IS_GITHUB_ACTIONS: 1

jobs:
  build-macos:
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          cache: true

      - name: Flutter info
        run: flutter doctor -v

      - name: Prepare (deps + codegen + core libs)
        run: make macos-prepare

      - name: Build and package
        run: make macos-release

      - name: Find artifacts
        id: find_artifacts
        run: |
          echo "DMG file:"
          find dist -name "*.dmg" -type f
          echo "PKG file:"
          find dist -name "*.pkg" -type f
          mkdir -p out
          cp dist/*/*.dmg out/ 2>/dev/null || true
          cp dist/*/*.pkg out/ 2>/dev/null || true
          ls -la out/

      - name: Upload DMG
        uses: actions/upload-artifact@v4
        with:
          name: Hiddify-macOS-ARM-dmg
          path: out/*.dmg
          retention-days: 7

      - name: Upload PKG
        uses: actions/upload-artifact@v4
        with:
          name: Hiddify-macOS-ARM-pkg
          path: out/*.pkg
          retention-days: 7
