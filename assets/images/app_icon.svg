<svg width="1024" height="1024" viewBox="0 0 1024 1024" fill="none" xmlns="http://www.w3.org/2000/svg">
<defs>
  <!-- Gradient for the shield body -->
  <linearGradient id="shieldGrad" x1="512" y1="80" x2="512" y2="920" gradientUnits="userSpaceOnUse">
    <stop offset="0" stop-color="#4ADE80"/>
    <stop offset="0.5" stop-color="#22C55E"/>
    <stop offset="1" stop-color="#16A34A"/>
  </linearGradient>
  <!-- Inner shadow / gloss -->
  <linearGradient id="glossGrad" x1="512" y1="120" x2="512" y2="550" gradientUnits="userSpaceOnUse">
    <stop offset="0" stop-color="white" stop-opacity="0.35"/>
    <stop offset="1" stop-color="white" stop-opacity="0"/>
  </linearGradient>
  <!-- Subtle depth gradient -->
  <linearGradient id="depthGrad" x1="512" y1="550" x2="512" y2="900" gradientUnits="userSpaceOnUse">
    <stop offset="0" stop-color="#15803D" stop-opacity="0"/>
    <stop offset="1" stop-color="#15803D" stop-opacity="0.4"/>
  </linearGradient>
  <!-- Checkmark gradient -->
  <linearGradient id="checkGrad" x1="380" y1="440" x2="660" y2="640" gradientUnits="userSpaceOnUse">
    <stop offset="0" stop-color="white"/>
    <stop offset="1" stop-color="#F0FDF4"/>
  </linearGradient>
</defs>

<!-- Drop shadow (subtle) -->
<filter id="shadow" x="-10%" y="-5%" width="120%" height="120%">
  <feDropShadow dx="0" dy="8" stdDeviation="24" flood-color="#000" flood-opacity="0.25"/>
</filter>

<!-- Outer glow -->
<filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
  <feGaussianBlur stdDeviation="40" result="blur"/>
  <feFlood flood-color="#22C55E" flood-opacity="0.3"/>
  <feComposite in2="blur" operator="in"/>
  <feMerge>
    <feMergeNode/>
    <feMergeNode in="SourceGraphic"/>
  </feMerge>
</filter>

<!-- Shield shape -->
<g filter="url(#shadow)">
  <!-- Main shield -->
  <path d="
    M 512 80
    C 512 80 200 160 140 190
    C 120 200 100 220 100 260
    L 100 440
    C 100 440 100 640 280 780
    C 380 860 460 900 512 920
    C 564 900 644 860 744 780
    C 924 640 924 440 924 440
    L 924 260
    C 924 220 904 200 884 190
    C 824 160 512 80 512 80
    Z
  " fill="url(#shieldGrad)"/>

  <!-- Gloss overlay -->
  <path d="
    M 512 80
    C 512 80 200 160 140 190
    C 120 200 100 220 100 260
    L 100 440
    C 100 440 100 540 200 620
    L 512 520
    L 824 620
    C 924 540 924 440 924 440
    L 924 260
    C 924 220 904 200 884 190
    C 824 160 512 80 512 80
    Z
  " fill="url(#glossGrad)"/>

  <!-- Bottom depth -->
  <path d="
    M 280 780
    C 380 860 460 900 512 920
    C 564 900 644 860 744 780
    L 512 680
    Z
  " fill="url(#depthGrad)"/>

  <!-- Inner border highlight -->
  <path d="
    M 512 120
    C 512 120 230 192 175 218
    C 158 226 140 244 140 278
    L 140 440
    C 140 440 140 620 300 750
    C 390 824 470 864 512 882
    C 554 864 634 824 724 750
    C 884 620 884 440 884 440
    L 884 278
    C 884 244 866 226 849 218
    C 794 192 512 120 512 120
    Z
  " fill="none" stroke="white" stroke-opacity="0.15" stroke-width="3"/>

  <!-- Checkmark -->
  <path d="
    M 380 520
    L 470 610
    L 660 400
  " stroke="url(#checkGrad)" stroke-width="72" stroke-linecap="round" stroke-linejoin="round" fill="none"/>

  <!-- Checkmark inner glow -->
  <path d="
    M 380 520
    L 470 610
    L 660 400
  " stroke="white" stroke-opacity="0.2" stroke-width="48" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
</g>
</svg>
